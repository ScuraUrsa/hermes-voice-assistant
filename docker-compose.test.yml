services:
  homeassistant:
    image: ghcr.io/home-assistant/home-assistant:stable
    container_name: homeassistant-test
    ports:
      - "8123:8123"
    volumes:
      - ./config/home-assistant-test:/config
    environment:
      - TZ=UTC
    restart: unless-stopped
    networks:
      - hermes-voice-test

  wyoming-whisper:
    image: rhasspy/wyoming-whisper
    container_name: wyoming-whisper-test
    command: --model base --port 10300
    ports:
      - "10300:10300"
    restart: unless-stopped
    networks:
      - hermes-voice-test

  wyoming-piper:
    image: rhasspy/wyoming-piper
    container_name: wyoming-piper-test
    command: --voice en_US-lessac-medium --port 10200
    ports:
      - "10200:10200"
    restart: unless-stopped
    networks:
      - hermes-voice-test

networks:
  hermes-voice-test:
    driver: bridge